<!-- http://developer.mozilla.org/ -->
<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>유튜브 구간 반복 재생</title>
	<link rel="stylesheet" href="css/vid-t.css">
</head>

<body>
	<div id="box">


		<div id="left">
			<h1> 재생 목록</h1>
			<div id="list"></div>
		</div>

		
		<div id="right">
			<div id="player">
				<div id="ad"></div>
				<div id="you_player"></div>
			</div>
			<div id="play-bar">
				<div id="play-now"></div>
			</div>
			<div id="play-msg">재생 목록에서 선택하세요</div>
			<div id="volume">
				<input id="volume-bar" type="range" min="0" max="100" value="25" step="1">
			</div>
		</div>
	</div>
</body>

<script src="js/list-t.js"></script>
<script src="js/api-t.js"></script>

</html>
