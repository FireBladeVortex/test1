<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>응답 폼</title>
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }

		body {
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #0f0f0f;
			font-family: 'Courier New', monospace;
		}

		/* 좌측 상단 관리자 버튼 */
		.admin-link {
			position: fixed;
			top: 16px;
			left: 16px;
			padding: 6px 12px;
			border: 1px solid #2a2a2a;
			border-radius: 6px;
			background: transparent;
			color: #444;
			font-family: 'Courier New', monospace;
			font-size: 10px;
			letter-spacing: 0.15em;
			text-decoration: none;
			text-transform: uppercase;
			transition: all 0.2s;
		}

		.admin-link:hover { border-color: #444; color: #888; background: #1a1a1a; }

		.card {
			background: #1a1a1a;
			border: 1px solid #2e2e2e;
			border-radius: 12px;
			padding: 48px 40px;
			width: 360px;
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 36px;
		}

		.title {
			color: #888;
			font-size: 11px;
			letter-spacing: 0.2em;
			text-transform: uppercase;
		}

		.num-grid {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 10px;
			width: 100%;
		}

		.num-btn {
			aspect-ratio: 1;
			border: 2px solid #2a2a2a;
			border-radius: 10px;
			background: #111;
			color: #444;
			font-family: 'Courier New', monospace;
			font-size: 22px;
			font-weight: bold;
			cursor: pointer;
			transition: all 0.15s ease;
			outline: none;
		}

		.num-btn:hover { border-color: #444; color: #888; }

		.num-btn.selected {
			border-color: #4ade80;
			color: #4ade80;
			background: #0d1f14;
			box-shadow: 0 0 14px rgba(74, 222, 128, 0.25);
		}

		.selected-display {
			font-size: 52px;
			font-weight: bold;
			color: #222;
			line-height: 1;
			transition: color 0.2s;
		}

		.selected-display.active { color: #4ade80; }

		.submit-btn {
			width: 100%;
			padding: 14px;
			border: 1px solid #333;
			border-radius: 8px;
			background: transparent;
			color: #666;
			font-family: 'Courier New', monospace;
			font-size: 12px;
			letter-spacing: 0.15em;
			cursor: pointer;
			transition: all 0.2s ease;
			text-transform: uppercase;
		}

		.submit-btn:hover:not(:disabled) { border-color: #555; color: #aaa; background: #1f1f1f; }
		.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

		.status {
			font-size: 11px;
			letter-spacing: 0.1em;
			color: #444;
			min-height: 16px;
			text-align: center;
			transition: color 0.3s;
		}

		.status.success { color: #4ade80; }
		.status.error   { color: #f87171; }
		.status.loading { color: #888; }
	</style>
</head>
<body>

<a class="admin-link" href="admin.html">admin</a>

<div class="card">
	<span class="title">Response Form</span>

	<div class="num-grid" id="numGrid"></div>

	<div class="selected-display" id="selectedDisplay">—</div>

	<button class="submit-btn" id="submitBtn" onclick="submitValue()" disabled>송신</button>

	<span class="status" id="status"></span>
</div>

<script>
	const APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL_HERE';

	let selected = null;

	const grid = document.getElementById('numGrid');
	for (let i = 1; i <= 9; i++) {
		const btn = document.createElement('button');
		btn.className   = 'num-btn';
		btn.textContent = i;
		btn.onclick     = () => selectNum(i, btn);
		grid.appendChild(btn);
	}

	function selectNum(num, btn) {
		document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
		btn.classList.add('selected');
		selected = num;

		const display = document.getElementById('selectedDisplay');
		display.textContent = num;
		display.classList.add('active');

		document.getElementById('submitBtn').disabled = false;
		document.getElementById('status').textContent = '';
	}

	async function submitValue() {
		if (selected === null) return;

		const submitBtn = document.getElementById('submitBtn');
		const status    = document.getElementById('status');

		submitBtn.disabled = true;
		status.className   = 'status loading';
		status.textContent = '전송 중...';

		try {
			const url  = APPS_SCRIPT_URL + '?action=submit&value=' + selected;
			const res  = await fetch(url);
			const data = await res.json();

			if (data.status === 'ok') {
				status.className   = 'status success';
				status.textContent = '저장 완료 → ' + data.filename;
			} else {
				status.className   = 'status error';
				status.textContent = '오류 [' + data.where + ']: ' + data.message;
			}
		} catch (e) {
			status.className   = 'status error';
			status.textContent = 'fetch 실패: ' + e.message;
		} finally {
			submitBtn.disabled = false;
		}
	}
</script>
</body>
</html>
