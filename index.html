<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>응답 폼</title>
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }

		body {
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #0f0f0f;
			font-family: 'Courier New', monospace;
		}

		.card {
			background: #1a1a1a;
			border: 1px solid #2e2e2e;
			border-radius: 12px;
			padding: 48px 40px;
			width: 360px;
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 40px;
		}

		.title {
			color: #888;
			font-size: 11px;
			letter-spacing: 0.2em;
			text-transform: uppercase;
		}

		/* 토글 버튼 */
		.toggle-wrap {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 16px;
		}

		.toggle-btn {
			width: 80px;
			height: 80px;
			border-radius: 50%;
			border: 2px solid #333;
			background: #111;
			cursor: pointer;
			position: relative;
			transition: all 0.2s ease;
			outline: none;
		}

		.toggle-btn::after {
			content: '';
			position: absolute;
			inset: 10px;
			border-radius: 50%;
			background: #2a2a2a;
			transition: all 0.2s ease;
		}

		.toggle-btn.on {
			border-color: #4ade80;
			box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
		}

		.toggle-btn.on::after {
			background: #4ade80;
			box-shadow: 0 0 12px rgba(74, 222, 128, 0.6);
		}

		.state-label {
			font-size: 13px;
			letter-spacing: 0.15em;
			color: #444;
			transition: color 0.2s;
		}

		.state-label.on { color: #4ade80; }

		.value-display {
			font-size: 48px;
			color: #222;
			font-weight: bold;
			transition: color 0.2s;
			line-height: 1;
		}

		.value-display.on { color: #4ade80; }

		/* 전송 버튼 */
		.submit-btn {
			width: 100%;
			padding: 14px;
			border: 1px solid #333;
			border-radius: 8px;
			background: transparent;
			color: #666;
			font-family: 'Courier New', monospace;
			font-size: 12px;
			letter-spacing: 0.15em;
			cursor: pointer;
			transition: all 0.2s ease;
			text-transform: uppercase;
		}

		.submit-btn:hover {
			border-color: #555;
			color: #aaa;
			background: #1f1f1f;
		}

		.submit-btn:disabled {
			opacity: 0.4;
			cursor: not-allowed;
		}

		/* 상태 메시지 */
		.status {
			font-size: 11px;
			letter-spacing: 0.1em;
			color: #444;
			min-height: 16px;
			text-align: center;
			transition: color 0.3s;
		}

		.status.success { color: #4ade80; }
		.status.error   { color: #f87171; }
		.status.loading { color: #888; }
	</style>
</head>
<body>
<div class="card">
	<span class="title">Response Form</span>

	<div class="toggle-wrap">
		<button class="toggle-btn" id="toggleBtn" onclick="toggle()" aria-label="토글 버튼"></button>
		<span class="state-label" id="stateLabel">OFF</span>
	</div>

	<div class="value-display" id="valueDisplay">0</div>

	<button class="submit-btn" id="submitBtn" onclick="submit()">송신</button>

	<span class="status" id="status"></span>
</div>

<script>
	// ⚙️ 여기에 Google Apps Script 배포 URL 입력
	const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzrRbgz4VGc8uUO2I9rvg6qiFn1ua2B1UoYDa98mNyWLhiYK9JIy5tC-0eE1wW2BYtn/exec';

	let isOn = false;

	function toggle() {
		isOn = !isOn;
		const btn   = document.getElementById('toggleBtn');
		const label = document.getElementById('stateLabel');
		const val   = document.getElementById('valueDisplay');

		btn.classList.toggle('on', isOn);
		label.classList.toggle('on', isOn);
		val.classList.toggle('on', isOn);

		label.textContent = isOn ? 'ON' : 'OFF';
		val.textContent   = isOn ? '1'  : '0';
	}
async function submit() {
    const submitBtn = document.getElementById('submitBtn');
    const status    = document.getElementById('status');

    submitBtn.disabled = true;
    status.className   = 'status loading';
    status.textContent = '전송 중...';

    try {
        const url = `${APPS_SCRIPT_URL}?value=${isOn ? 1 : 0}`;
        const res  = await fetch(url);
        const data = await res.json();

        if (data.status === 'ok') {
            status.className   = 'status success';
            status.textContent = `저장 완료 → ${data.filename}`;
        } else {
            throw new Error(data.message || '서버 오류');
        }
    } catch (e) {
        status.className   = 'status error';
        status.textContent = `오류: ${e.message}`;
    } finally {
        submitBtn.disabled = false;
    }
}
</script>
</body>
</html>
