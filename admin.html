<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>관리자 페이지</title>
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }

		body {
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #0f0f0f;
			font-family: 'Courier New', monospace;
		}

		.back-link {
			position: fixed;
			top: 16px;
			left: 16px;
			padding: 6px 12px;
			border: 1px solid #2a2a2a;
			border-radius: 6px;
			background: transparent;
			color: #444;
			font-family: 'Courier New', monospace;
			font-size: 10px;
			letter-spacing: 0.15em;
			text-decoration: none;
			text-transform: uppercase;
			transition: all 0.2s;
		}

		.back-link:hover { border-color: #444; color: #888; background: #1a1a1a; }

		.card {
			background: #1a1a1a;
			border: 1px solid #2e2e2e;
			border-radius: 12px;
			padding: 48px 40px;
			width: 360px;
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 24px;
		}

		.title {
			color: #888;
			font-size: 11px;
			letter-spacing: 0.2em;
			text-transform: uppercase;
		}

		.section-label {
			color: #555;
			font-size: 10px;
			letter-spacing: 0.15em;
			text-transform: uppercase;
			text-align: center;
		}

		input[type="password"] {
			width: 100%;
			padding: 12px 16px;
			background: #111;
			border: 1px solid #2e2e2e;
			border-radius: 8px;
			color: #ccc;
			font-family: 'Courier New', monospace;
			font-size: 14px;
			letter-spacing: 0.3em;
			text-align: center;
			outline: none;
			transition: border-color 0.2s;
		}

		input[type="password"]:focus { border-color: #555; }

		.action-btn {
			width: 100%;
			padding: 14px;
			border-radius: 8px;
			font-family: 'Courier New', monospace;
			font-size: 12px;
			letter-spacing: 0.15em;
			cursor: pointer;
			transition: all 0.2s ease;
			text-transform: uppercase;
			outline: none;
		}

		.btn-enter {
			border: 1px solid #333;
			background: transparent;
			color: #666;
		}

		.btn-enter:hover { border-color: #555; color: #aaa; background: #1f1f1f; }

		.btn-delete {
			border: 1px solid #7f1d1d;
			background: transparent;
			color: #f87171;
		}

		.btn-delete:hover:not(:disabled) { background: #1f0a0a; border-color: #f87171; }
		.btn-delete:disabled { opacity: 0.4; cursor: not-allowed; }

		.status {
			font-size: 11px;
			letter-spacing: 0.1em;
			color: #444;
			min-height: 16px;
			text-align: center;
		}

		.status.success { color: #4ade80; }
		.status.error   { color: #f87171; }
		.status.loading { color: #888; }
		.status.info    { color: #60a5fa; }
		.status.empty   { color: #facc15; }

		#loginArea { width: 100%; display: flex; flex-direction: column; gap: 16px; }
		#adminArea { width: 100%; display: none; flex-direction: column; gap: 16px; }
	</style>
</head>
<body>

<a class="back-link" href="index.html">← 폼</a>

<div class="card">
	<span class="title">Admin</span>

	<!-- 로그인 영역 -->
	<div id="loginArea">
		<span class="section-label">비밀번호 입력</span>
		<input type="password" id="loginPw" placeholder="* * * *" maxlength="20"
			onkeydown="if(event.key==='Enter') enterAdmin()">
		<button class="action-btn btn-enter" onclick="enterAdmin()">진입</button>
	</div>

	<!-- 관리 영역 -->
	<div id="adminArea">
		<span class="section-label">delete_ready 파일 삭제</span>
		<input type="password" id="deletePw" placeholder="삭제 비밀번호" maxlength="20"
			onkeydown="if(event.key==='Enter') deleteFiles()">
		<button class="action-btn btn-delete" id="deleteBtn" onclick="deleteFiles()">삭제 실행</button>
	</div>

	<span class="status" id="status"></span>
</div>

<script>
	const APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL_HERE';

	const LOGIN_PW  = '1234';
	const DELETE_PW = '2345';

	function enterAdmin() {
		const pw     = document.getElementById('loginPw').value;
		const status = document.getElementById('status');

		if (pw !== LOGIN_PW) {
			status.className   = 'status error';
			status.textContent = '비밀번호가 틀렸습니다';
			document.getElementById('loginPw').value = '';
			return;
		}

		document.getElementById('loginArea').style.display = 'none';
		document.getElementById('adminArea').style.display = 'flex';
		status.className   = 'status info';
		status.textContent = '관리자 모드 — delete_ready 폴더 대상';
	}

	async function deleteFiles() {
		const pw        = document.getElementById('deletePw').value;
		const deleteBtn = document.getElementById('deleteBtn');
		const status    = document.getElementById('status');

		if (pw !== DELETE_PW) {
			status.className   = 'status error';
			status.textContent = '삭제 비밀번호가 틀렸습니다';
			document.getElementById('deletePw').value = '';
			return;
		}

		deleteBtn.disabled = true;
		status.className   = 'status loading';
		status.textContent = '확인 중...';

		try {
			const url  = APPS_SCRIPT_URL + '?action=delete';
			const res  = await fetch(url);
			const data = await res.json();

			if (data.status === 'ok') {
				status.className   = 'status success';
				status.textContent = '삭제 완료 (' + data.deleted + '개 파일)';
			} else if (data.status === 'empty') {
				status.className   = 'status empty';
				status.textContent = '삭제할 것이 없습니다';
			} else {
				status.className   = 'status error';
				status.textContent = '오류 [' + data.where + ']: ' + data.message;
			}
		} catch (e) {
			status.className   = 'status error';
			status.textContent = 'fetch 실패: ' + e.message;
		} finally {
			deleteBtn.disabled = false;
			document.getElementById('deletePw').value = '';
		}
	}
</script>
</body>
</html>
