<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>입력 패널</title>
	<style>
		:root {
			--background: #000000;
			--book-cover-color: #ffff00;
			--book-border-color: #aa8e8e;
			--book-page-color: #999999;
			--book-post-it: #000000;
			--eye-1: #000000;
			--eye-2: #000000;
			--eye-3: #000000;
			--gold: #d90020;
			--burgundy: #d90020;
		}

		body {
			background: var(--background);
		}

		#canvas {
			width: 480px; /* 960 */
			height: 540px;
			background: var(--book-cover-color);
			border: 3px solid var(--book-border-color);
			border-radius: 9px;
		}

	</style>
</head>

<body>
	<canvas id="canvas" width="480" height="540"></canvas>
</body>
</html>
