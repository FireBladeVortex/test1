<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>유튜브 구간 반복 재생</title>
	<style>
		/* ── 기본 리셋 및 레이아웃 설정 ── */
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		:root {
			--bg:        #526fba;
			--panel:     #13161e;
			--border:    #1f2433;
			--accent:    #c8a96e;
			--accent2:   #e8c98e;
			--text:      #e4e6ed;
			--text-muted:#5a6070;
			--btn-bg:    #181c27;
			--btn-hover: #1e2438;
			--radius:    6px;
			--thumb-w:   160px;
			--thumb-h:   90px;
			--gap:       3px;
		}

		body {
			width: 100%;
			height: 100%;
			overflow: hidden;           /* 스크롤바 방지 */
			background: var(--bg);
			color: var(--text);
			font-family: 'Courier New', monospace;
		}

		/* ── 전체 레이아웃: 세로 2등분 ── */
		#app {
			display: flex;
			width: 100vw;
			height: 100vh;
			overflow: hidden;
		}

		/* ────────────────────────────────
		   왼쪽 패널: 썸네일 flex-wrap 나열
		   - 15개 제한 없이 VIDEOS 전체 표시
		   - 썸네일은 160×90 고정, gap 3px
		   - 내부 콘텐츠가 넘칠 경우 패널 내부에서만 숨김 처리
		──────────────────────────────── */
		#sidebar {
			/* 화면 절반 고정, 내부 버튼은 비율로 채움 */
			flex: 0 0 50%;
			height: 100%;
			background: var(--panel);
			border-right: 1px solid var(--border);
			display: flex;
			flex-direction: column;
			padding: 16px;
			gap: 10px;
			/* 패널 자체는 넘치지 않도록 */
			overflow: hidden;
		}

		#sidebar h1 {
			font-size: 11px;
			letter-spacing: 0.25em;
			text-transform: uppercase;
			color: var(--accent);
			border-bottom: 1px solid var(--border);
			padding-bottom: 10px;
			flex-shrink: 0;
		}

		/* ── 썸네일 나열 컨테이너 ──
		   목적: 고정 크기(160×90) 버튼을 wrap하여 공간이 허용하는 만큼 채움
		   로직: flex-wrap으로 줄바꿈, align-content: flex-start로 위에서부터 채움
		         overflow hidden으로 뷰포트를 벗어나는 항목은 잘라냄(스크롤 없음) */
		#grid {
			flex: 1;
			display: flex;
			flex-wrap: wrap;
			gap: var(--gap);
			align-content: flex-start;
			/* 넘치는 썸네일은 잘라내어 스크롤바가 생기지 않도록 */
			overflow: hidden;
			min-height: 0;           /* flex 자식이 넘치지 않도록 */
		}

		/* ── 개별 버튼 ──
		   목적: 썸네일을 160×90 고정 크기로 표시
		   로직: width/height를 CSS 변수로 고정, flex shrink/grow 금지 */
		.slot-btn {
			position: relative;
			width: var(--thumb-w);
			height: var(--thumb-h);
			/* flex 아이템이 크기를 변경하지 않도록 고정 
			flex-shrink: 0;
			flex-grow: 0;
			background: var(--btn-bg);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			overflow: hidden;
			transition: border-color 0.15s, transform 0.1s;*/
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		/* 마우스 올린 썸네일 강조 */
		.slot-btn:hover {
			border-color: var(--accent);
			background: var(--btn-hover);
			transform: scale(1);
		}

		/* 활성(현재 재생 중) 버튼 강조 */
		.slot-btn.active {
			border-color: var(--accent);
			box-shadow: 0 0 0 2px var(--accent), inset 0 0 20px rgba(200,169,110,0.08);
		}
		.slot-btn.dimmed {
   			opacity: 0.4;
   			filter: brightness(0.6);
			transition: opacity 0.2s, filter 0.2s;
		}

		/* 썸네일 이미지 */
		.slot-btn img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
		}

		/* 썸네일 위 번호 오버레이 */
		.slot-label {
			position: absolute;
			bottom: 4px;
			right: 5px;
			font-size: 10px;
			font-weight: bold;
			color: #fff;
			text-shadow: 0 1px 3px #000, 0 0 6px #000;
			letter-spacing: 0.05em;
			pointer-events: none;
		}

		/* ────────────────────────────────
		   오른쪽 패널: 플레이어 중앙 배치
		──────────────────────────────── */
		#player-panel {
			flex: 1;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			gap: 16px;
			padding: 20px;
			min-width: 0;
		}

		/* 플레이어 래퍼: 비율 유지하며 축소 */
		#player-wrap {
			position: relative;
			width: min(640px, 100%);          /* 최대 640px, 공간 부족하면 축소 */
			aspect-ratio: 16 / 9;          /* 640×390 비율 고정 */
		}

		#player-wrap iframe,
		#ytplayer {
			width: 100%;
			height: 100%;
			border: none;
			border-radius: var(--radius);
			display: block;
		}

		/* 플레이어 아래 상태 표시 */
		#now-info {
			font-size: 11px;
			letter-spacing: 0.15em;
			color: var(--accent);
			text-transform: uppercase;
			min-height: 1.4em;
			text-align: center;
		}

		/* 구간 표시 바 */
		#loop-bar {
			width: min(640px, 100%);
			height: 3px;
			background: var(--border);
			border-radius: 99px;
			overflow: hidden;
		}

		#loop-fill {
			height: 100%;
			width: 0%;
			background: linear-gradient(90deg, var(--accent), var(--accent2));
			transition: width 0.4s linear;
			border-radius: 99px;
		}
	</style>
</head>
<body>


<div id="app">

	<!-- 왼쪽: 버튼 패널 -->
	<div id="sidebar">
		<h1>▶ Loop Slots</h1>
		<div id="grid"></div>
	</div>

	<!-- 오른쪽: 플레이어 패널 -->
	<div id="player-panel">
		<div id="player-wrap">
			<!-- YouTube IFrame API가 이 div를 플레이어로 교체함 -->
			<div id="ytplayer"></div>
		</div>
		<div id="loop-bar"><div id="loop-fill"></div></div>
		<div id="now-info">슬롯을 선택하세요</div>
	</div>

</div>

<script src="js/list.js"></script>
<script src="js/api.js"></script>

</body>
</html>
