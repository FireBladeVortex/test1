<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>YT Loop Player</title>
	<style>
		/* ── 기본 리셋 및 레이아웃 설정 ── */
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		:root {
			--bg:        #0d0f14;
			--panel:     #13161e;
			--border:    #1f2433;
			--accent:    #c8a96e;
			--accent2:   #e8c98e;
			--text:      #e4e6ed;
			--text-muted:#5a6070;
			--btn-bg:    #181c27;
			--btn-hover: #1e2438;
			--radius:    6px;
		}

		html, body {
			width: 100%;
			height: 100%;
			overflow: hidden;           /* 스크롤바 방지 */
			background: var(--bg);
			color: var(--text);
			font-family: 'Courier New', monospace;
		}

		/* ── 전체 레이아웃: 세로 2등분 ── */
		#app {
			display: flex;
			width: 100vw;
			height: 100vh;
		}

		/* ────────────────────────────────
		   왼쪽 패널: 버튼 3×5 그리드
		──────────────────────────────── */
		#sidebar {
			/* 화면 절반 고정, 내부 버튼은 비율로 채움 */
			flex: 0 0 50%;
			height: 100%;
			background: var(--panel);
			border-right: 1px solid var(--border);
			display: flex;
			flex-direction: column;
			padding: 16px;
			gap: 12px;
		}

		#sidebar h1 {
			font-size: 11px;
			letter-spacing: 0.25em;
			text-transform: uppercase;
			color: var(--accent);
			border-bottom: 1px solid var(--border);
			padding-bottom: 10px;
			flex-shrink: 0;
		}

		/* 버튼 그리드: 3열 5행, 남은 높이 모두 사용 */
		#grid {
			flex: 1;
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			grid-template-rows: repeat(5, 1fr);
			gap: 8px;
			min-height: 0;           /* flex 자식이 넘치지 않도록 */
		}

		/* ── 개별 버튼 ── */
		.slot-btn {
			position: relative;
			background: var(--btn-bg);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			cursor: pointer;
			overflow: hidden;
			transition: border-color 0.15s, transform 0.1s;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.slot-btn:hover {
			border-color: var(--accent);
			background: var(--btn-hover);
			transform: scale(1.02);
		}

		/* 활성(현재 재생 중) 버튼 강조 */
		.slot-btn.active {
			border-color: var(--accent);
			box-shadow: 0 0 0 2px var(--accent), inset 0 0 20px rgba(200,169,110,0.08);
		}

		/* 비어있는 슬롯 */
		.slot-btn.empty {
			cursor: default;
			opacity: 0.3;
		}

		.slot-btn.empty:hover {
			border-color: var(--border);
			transform: none;
		}

		/* 썸네일 이미지 */
		.slot-btn img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
		}

		/* 썸네일 위 번호 오버레이 */
		.slot-label {
			position: absolute;
			bottom: 4px;
			right: 5px;
			font-size: 10px;
			font-weight: bold;
			color: #fff;
			text-shadow: 0 1px 3px #000, 0 0 6px #000;
			letter-spacing: 0.05em;
			pointer-events: none;
		}

		/* 썸네일 없을 때 숫자 표시 */
		.slot-num {
			font-size: clamp(12px, 2vw, 20px);
			font-weight: bold;
			color: var(--text-muted);
			letter-spacing: 0.1em;
		}

		/* ────────────────────────────────
		   오른쪽 패널: 플레이어 중앙 배치
		──────────────────────────────── */
		#player-panel {
			flex: 1;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			gap: 16px;
			padding: 20px;
			min-width: 0;
		}

		/* 플레이어 래퍼: 비율 유지하며 축소 */
		#player-wrap {
			position: relative;
			width: min(640px, 100%);          /* 최대 640px, 공간 부족하면 축소 */
			aspect-ratio: 640 / 390;          /* 640×390 비율 고정 */
		}

		#player-wrap iframe,
		#ytplayer {
			width: 100%;
			height: 100%;
			border: none;
			border-radius: var(--radius);
			display: block;
		}

		/* 플레이어 아래 상태 표시 */
		#now-info {
			font-size: 11px;
			letter-spacing: 0.15em;
			color: var(--accent);
			text-transform: uppercase;
			min-height: 1.4em;
			text-align: center;
		}

		/* 구간 표시 바 */
		#loop-bar {
			width: min(640px, 100%);
			height: 3px;
			background: var(--border);
			border-radius: 99px;
			overflow: hidden;
		}

		#loop-fill {
			height: 100%;
			width: 0%;
			background: linear-gradient(90deg, var(--accent), var(--accent2));
			transition: width 0.4s linear;
			border-radius: 99px;
		}
	</style>
</head>
<body>

<!-- ════════════════════════════════════════
     ★ 영상 목록 설정 공간 ★
     video : YouTube 영상 ID (URL의 v= 뒤 값)
             예) https://youtu.be/dQw4w9WgXcQ → "dQw4w9WgXcQ"
     start : 반복 시작 시간 (초 단위)
     end   : 반복 종료 시간 (초 단위)
     최대 15개까지 등록 가능 (초과분은 무시됨)
════════════════════════════════════════ -->
<script>
const VIDEOS = [
	{
		video: "https://youtu.be/h3l1SyPMpoE?si=bnxdJ7LTCtVB4bnG", /* 아쿠루 - 죽음의 게임 */
		start: 110,
		end: "end"
	},
	{
		video: "https://youtu.be/z1yKzg-bjeA?si=3ikiOfNyQIf4Q5mP", /* 미녕이 - 사랑해줘 */
		start: 0,
		end: "end"
	},
	{
		video: "https://youtu.be/mW0jfEH6HW0?si=qnWfX0KNB0DIBsrL", /* 감규리 - 내꺼 하는 법 */
		start: 0,
		end: "end"
	},
	{
		video: "https://youtu.be/1dbXrB7hg7o?si=uQLfRYSg_V5D_zF3", /* 마레 플로스 - Fly Me To The Moon */
		start: 0,
		end: "end"
	},
	{
		video: "https://youtu.be/FkLVSBZb4sw?si=U9tTAzCw_GRDKeA0", /* 마레 플로스 - Englishman in New York */
		start: 0,
		end: "end"
	},
	{
		video: "https://youtu.be/UOwS1ombcWY?si=WsuWMGD6SQwqWPDZ", /* 마레 플로스 - Over the Rainbow */
		start: 0,
		end: "end"
	},
	{
		video: "https://youtu.be/tJjY_6eH0S4?si=dhitMcPtUjTJFGvE", /* 마레 플로스 - Englishman in New York */
		start: 0,
		end: "end"
	},
	{
		video: "https://youtu.be/PAzl7hXOAS8?si=MrSVud5AzlGxvYdi",
		start: 0,
		end: "end"
	},
	{
		video: "https://youtu.be/7_XPAV88jB8?si=PNcSirw2MLN4_XB7",
		start: 0,
		end: "end"
	},
	{
		video: "https://youtu.be/jVilOvw1oHU?si=zUsurujKacsDXMv2",
		start: 0,
		end: "end"
	},
	{
		video: "https://youtu.be/bCBVxqCUAeY?si=DGAM3Qm5HK-3USSS",
		start: 0,
		end: "end"
	},
	{
		video: "https://youtu.be/7_XPAV88jB8?si=LMblgI7USOEPQfu2",
		start: 0,
		end: "end"
	},
	/* ── 여기에 추가 입력 ──
	{
		video: "영상ID",
		start: 0,
		end: "end"
	},
	{
		video: "영상ID",
		start: 0,
		end: "end"
	},
	{
		video: "영상ID",
		start: 0,
		end: "end"
	},
	*/
]
</script>
<!-- ════════════════════════════════════════ -->


<div id="app">

	<!-- 왼쪽: 버튼 패널 -->
	<div id="sidebar">
		<h1>▶ Loop Slots</h1>
		<div id="grid"></div>
	</div>

	<!-- 오른쪽: 플레이어 패널 -->
	<div id="player-panel">
		<div id="player-wrap">
			<!-- YouTube IFrame API가 이 div를 플레이어로 교체함 -->
			<div id="ytplayer"></div>
		</div>
		<div id="loop-bar"><div id="loop-fill"></div></div>
		<div id="now-info">슬롯을 선택하세요</div>
	</div>

</div>


<script>
// ── YouTube IFrame Player API 비동기 로드 ──
const tag = document.createElement('script')
tag.src = "https://www.youtube.com/iframe_api"
document.head.appendChild(tag)

// ── 전역 상태 ──
let player       = null   // YT.Player 인스턴스
let loopTimer    = null   // 구간 감시 인터벌
let activeSlot   = -1     // 현재 선택된 슬롯 인덱스
let currentVideo = null   // 현재 재생 중인 VIDEOS 항목

// ── 15개 슬롯 버튼 생성 ──
// 목적: VIDEOS 배열 기반으로 버튼 렌더링 (썸네일 or 번호)
function buildGrid() {
	const grid = document.getElementById('grid')
	grid.innerHTML = ''

	for (let i = 0; i < 15; i++) {
		const btn = document.createElement('button')
		btn.className = 'slot-btn'
		btn.dataset.index = i

		const entry = VIDEOS[i]

		if (entry) {
			// 썸네일 로드 시도: YouTube 표준 썸네일 URL
			const img = document.createElement('img')
			img.src = "https://img.youtube.com/vi/${parseVideoId(entry.video)}/mqdefault.jpg"
			img.alt = `슬롯 ${i + 1}`

			// 썸네일 로드 실패 시 숫자로 폴백
			img.onerror = () => {
				img.remove()
				const num = document.createElement('span')
				num.className = 'slot-num'
				num.textContent = i + 1
				btn.appendChild(num)
			}

			btn.appendChild(img)

			// 슬롯 번호 오버레이 (썸네일 위)
			const lbl = document.createElement('span')
			lbl.className = 'slot-label'
			lbl.textContent = i + 1
			btn.appendChild(lbl)

			// 클릭 이벤트: 해당 슬롯 영상 재생
			btn.addEventListener('click', () => playSlot(i))
		} else {
			// 미등록 슬롯: 비활성 처리
			btn.classList.add('empty')
			const num = document.createElement('span')
			num.className = 'slot-num'
			num.textContent = i + 1
			btn.appendChild(num)
		}

		grid.appendChild(btn)
	}
}

// ── IFrame Player API 준비 완료 콜백 ──
// 목적: API 로드 후 플레이어 인스턴스 생성
function onYouTubeIframeAPIReady() {
	player = new YT.Player('ytplayer', {
		width: '100%',
		height: '100%',
		videoId: '',
		playerVars: {
			autoplay: 0,
			rel: 0,
			modestbranding: 1,
		},
		events: {
			onStateChange: onPlayerStateChange
		}
	})
}

// ── 슬롯 재생 로직 ──
// 목적: 선택한 슬롯의 영상을 start~end 구간으로 반복 설정
function playSlot(index) {
	if (!player || !VIDEOS[index]) return

	// 이전 감시 타이머 정리
	clearInterval(loopTimer)

	// 활성 버튼 시각 업데이트
	document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('active'))
	document.querySelector(`.slot-btn[data-index="${index}"]`).classList.add('active')

	activeSlot   = index
	currentVideo = { ...VIDEOS[index], video: parseVideoId(VIDEOS[index].video) }

	// 같은 영상이면 seek만, 다른 영상이면 로드
	const currentId = player.getVideoData ? player.getVideoData().video_id : ''
	if (currentId === currentVideo.video) {
		player.seekTo(currentVideo.start, true)
		player.playVideo()
	} else {
		player.loadVideoById({
			videoId: currentVideo.video,
			startSeconds: currentVideo.start,
			...(currentVideo.end !== "end" && { endSeconds: currentVideo.end })
		})
	}

	updateInfo()

	// 구간 감시: 500ms마다 현재 시간 확인 후 초과 시 시작점으로 복귀
	loopTimer = setInterval(() => {
		if (!player || !currentVideo) return
		const t = player.getCurrentTime()
		if (currentVideo.end !== "end" && t >= currentVideo.end) {
			player.seekTo(currentVideo.start, true)
		}
		// 진행 바 업데이트
		const ratio = (t - currentVideo.start) / (currentVideo.end - currentVideo.start)
		document.getElementById('loop-fill').style.width = Math.max(0, Math.min(1, ratio)) * 100 + '%'
	}, 500)
}

// ── 플레이어 상태 변경 처리 ──
// 목적: 영상이 종료(state=0)되면 자동으로 시작점으로 되감기
function onPlayerStateChange(e) {
	if (e.data === YT.PlayerState.ENDED && currentVideo) {
		player.seekTo(currentVideo.start, true)
		player.playVideo()
	}
}

// ── 상태 텍스트 업데이트 ──
function updateInfo() {
	if (!currentVideo) return
	const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`
	document.getElementById('now-info').textContent =
		`Slot ${activeSlot + 1}  ·  ${fmt(currentVideo.start)} → ${fmt(currentVideo.end)}`
}

// 목적: URL 전체 또는 ID만 입력해도 영상 ID만 추출
function parseVideoId(v) {
	const m = v.match(/(?:youtu\.be\/|v=)([^?&]+)/)
	return m ? m[1] : v
}


// ── 초기화 ──
buildGrid()
</script>

</body>
</html>
